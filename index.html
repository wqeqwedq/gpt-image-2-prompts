<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT Image 2.0 提示词案例库</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <!-- 邀请码验证界面 -->
    <div class="invitation-overlay" id="invitationOverlay">
        <div class="invitation-card">
            <div class="invitation-icon">🔐</div>
            <h2 class="invitation-title">欢迎使用 GPT Image 2.0</h2>
            <p class="invitation-subtitle">请输入邀请码以解锁全部功能</p>
            <div class="invitation-input-wrapper">
                <input 
                    type="text" 
                    class="invitation-input" 
                    id="invitationInput" 
                    placeholder="请输入邀请码"
                >
            </div>
            <button class="invitation-btn btn-primary" id="invitationBtn">验证邀请码</button>
            <div class="invitation-error" id="invitationError"></div>
            <p class="invitation-hint">邀请码可联系管理员获取</p>
        </div>
    </div>

    <!-- 主容器 -->
    <div class="container">
        <!-- 左侧导航栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1>🎨 GPT Image</h1>
                <p>AI 生图提示词案例库</p>
            </div>
            <nav class="categories"></nav>
        </aside>

        <!-- 右侧主内容区 -->
        <main class="main-content">
            <!-- 顶部搜索栏 -->
            <div class="search-bar">
                <button class="ai-generate-entry-btn btn-primary" id="aiGenerateBtn">
                    <span class="ai-btn-icon">✨</span>
                    <span class="ai-btn-text">AI 生图</span>
                </button>
                <div class="search-input-wrapper">
                    <span class="search-icon">🔍</span>
                    <input 
                        type="text" 
                        class="search-input" 
                        id="searchInput" 
                        placeholder="搜索提示词..."
                    >
                </div>
                <span class="stats">共 <span id="imageCount">0</span> 张图片</span>
            </div>

            <!-- 图片网格 -->
            <div class="content-area">
                <div class="image-grid"></div>
            </div>
        </main>
    </div>

    <!-- 模态框 -->
    <div class="modal">
        <div class="modal-content"></div>
    </div>

    <!-- 图片放大查看 -->
    <div class="image-zoom-overlay" id="imageZoomOverlay">
        <img src="" alt="放大查看">
        <button class="zoom-close">✕</button>
    </div>

    <!-- JavaScript -->
    <script type="module" src="js/index.js"></script>
</body>
</html>
